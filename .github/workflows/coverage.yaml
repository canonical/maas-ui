name: Test coverage and TiCS Report
on:
  schedule:  # uses last commit on default branch (main)
    - cron: "30 0 * * 6" # At 0:30 on Saturday
  push:
    branches:
      - "tics-debug-*"
  # temporarily disabling client mode due to quota
  # pull_request:
  #   types: [opened, synchronize, reopened]

jobs:
  test-coverage:
    name: Run tests with coverage
    runs-on: [ self-hosted, linux, amd64, tiobe, jammy ]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'yarn'

      # More aggressive caching strategy
      - name: Restore test cache
        uses: actions/cache@v4
        id: test-cache
        with:
          path: |
            coverage
            .nyc_output
            **/node_modules/.cache
          key: ${{ runner.os }}-test-coverage-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-test-coverage-

      - name: Install packages
        run: CYPRESS_INSTALL_BINARY=0 yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 1

  tics-analysis:
    name: TICS Analysis
    runs-on: [ self-hosted, linux, amd64, tiobe, jammy ]
    needs: test-coverage
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important for TICS to analyze history

      # Cache TICS installation to avoid reinstalling
      - name: Cache TICS installation
        uses: actions/cache@v4
        id: tics-cache
        with:
          path: /tmp/tics-installation
          key: ${{ runner.os }}-tics-installation-${{ hashFiles('**/.tics') }}

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      # Determine analysis mode
      - name: Set TICS analysis mode
        id: tics-mode
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "mode=client" >> $GITHUB_OUTPUT
            echo "analyze_selection=changed_files_only" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "mode=qserver" >> $GITHUB_OUTPUT
            echo "analyze_selection=full" >> $GITHUB_OUTPUT
          else
            echo "mode=qserver" >> $GITHUB_OUTPUT
            echo "analyze_selection=changed_files_only" >> $GITHUB_OUTPUT
          fi

      - name: Run TICS Analyzer
        uses: tiobe/tics-github-action@v3
        env:
          # Add environment variables to optimize TICS performance
          TICS_ANALYZE_SELECTION: ${{ steps.tics-mode.outputs.analyze_selection }}
          TICS_NUM_THREADS: 4  # Adjust based on your runner's capabilities
        with:
          mode: ${{ steps.tics-mode.outputs.mode }}
          project: maas-ui
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: ${{ steps.tics-cache.outputs.cache-hit != 'true' }}
          tmpdir: /tmp/tics
          branchdir: ${{ github.workspace }}
          # Add TICS-specific performance options if available
          # ticsOptions: "-performance-mode=high -max-cpu=4"

      - name: Upload TICS Report
        uses: actions/upload-artifact@v4
        with:
          name: tics-report
          path: /tmp/tics
          retention-days: 7

  publish-coverage-report:
    name: Publish Coverage Report
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: [ self-hosted, linux, amd64, tiobe, jammy ]
    needs: tics-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4